<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Elementary, Dear Watson — Will Watson, Health Services Researcher. Site launching soon.">
  <title>Elementary, Dear Watson — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2332;
      --gold: #c8a45c;
      --gold-light: #e8d5a3;
      --cream: #faf8f4;
    }
    html { font-size: 17px; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--navy);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    h1 {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3em;
      letter-spacing: 0.02em;
    }
    .tagline {
      font-style: italic;
      color: var(--gold-light);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: var(--gold);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }
    .name {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3em;
    }
    .title {
      color: #8a96a8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .status {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    a {
      color: var(--gold-light);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      transition: color 0.2s;
    }
    a:hover { color: #fff; }
    .contact {
      font-size: 0.9rem;
      color: #8a96a8;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Elementary, Dear Watson</h1>
    <p class="tagline">Making health services research accessible</p>
    <div class="divider"></div>
    <p class="name">William Watson</p>
    <p class="title">
      PhD Candidate, Health Systems &amp; Services Research<br>
      University of Arkansas for Medical Sciences<br>
    </p>
    <p class="status">Site Under Construction</p>
    <p class="contact">
      <a href="mailto:watsonwp@gmail.com">watsonwp@gmail.com</a>
    </p>
  </div>
</body>
</html>
